services:
  worker:
    build: .
    environment:
      REDIS_HOST: go-ewallet-backend-redis-1
      REDIS_PORT: 6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TO: ${SMTP_TO}
    networks:
      - ewallet-network

networks:
  ewallet-network:
    external: true
