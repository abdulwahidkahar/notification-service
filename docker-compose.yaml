services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ewallet-network

  worker:
    build: .
    environment:
      REDIS_HOST: go-ewallet-backend-redis-1
      REDIS_PORT: 6379
      KAFKA_BROKER: kafka:9092
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TO: ${SMTP_TO}
    depends_on:
      - rabbitmq
    networks:
      - ewallet-network

networks:
  ewallet-network:
    external: true
